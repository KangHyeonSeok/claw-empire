# This file is generated by scripts/generate-docker-fleet.mjs.
# Edit deploy/docker/fleet.config.json instead of editing this file directly.
name: claw-empire-fleet

x-claw-empire-service: &claw-empire-service
  image: ${CLAW_EMPIRE_IMAGE:-claw-empire:local}
  build:
    context: ../..
    dockerfile: Dockerfile
  restart: unless-stopped
  stop_grace_period: 30s
  environment:
    NODE_ENV: production
    HOST: 0.0.0.0
    PORT: 8790
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:8790/healthz').then((res)=>{if(!res.ok) process.exit(1);}).catch(()=>process.exit(1))",
      ]
    interval: 30s
    timeout: 5s
    start_period: 40s
    retries: 5

services:
  my-knit-log:
    <<: *claw-empire-service
    container_name: claw-empire-my-knit-log
    env_file:
      - ./runtime/my-knit-log.env
    ports:
      - "8791:8790"
    volumes:
      - my_knit_log_data:/var/lib/claw-empire
      - my_knit_log_logs:/var/log/claw-empire
      - shared_claude_auth:/home/app/.claude
      - shared_codex_auth:/home/app/.codex
      - shared_gemini_auth:/home/app/.gemini
      - shared_opencode_auth:/home/app/.local/share/opencode

  berry-mix:
    <<: *claw-empire-service
    container_name: claw-empire-berry-mix
    env_file:
      - ./runtime/berry-mix.env
    ports:
      - "8792:8790"
    volumes:
      - berry_mix_data:/var/lib/claw-empire
      - berry_mix_logs:/var/log/claw-empire
      - shared_claude_auth:/home/app/.claude
      - shared_codex_auth:/home/app/.codex
      - shared_gemini_auth:/home/app/.gemini
      - shared_opencode_auth:/home/app/.local/share/opencode

  world-creator:
    <<: *claw-empire-service
    container_name: claw-empire-world-creator
    env_file:
      - ./runtime/world-creator.env
    ports:
      - "8793:8790"
    volumes:
      - world_creator_data:/var/lib/claw-empire
      - world_creator_logs:/var/log/claw-empire
      - shared_claude_auth:/home/app/.claude
      - shared_codex_auth:/home/app/.codex
      - shared_gemini_auth:/home/app/.gemini
      - shared_opencode_auth:/home/app/.local/share/opencode

volumes:
  my_knit_log_data:
  my_knit_log_logs:
  berry_mix_data:
  berry_mix_logs:
  world_creator_data:
  world_creator_logs:
  shared_claude_auth:
  shared_codex_auth:
  shared_gemini_auth:
  shared_opencode_auth:
