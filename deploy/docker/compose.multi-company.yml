# This file is generated by scripts/generate-docker-fleet.mjs.
# Edit deploy/docker/fleet.config.json instead of editing this file directly.
name: claw-empire-fleet

x-claw-empire-service: &claw-empire-service
  image: ${CLAW_EMPIRE_IMAGE:-claw-empire:local}
  build:
    context: ../..
    dockerfile: Dockerfile
  restart: unless-stopped
  stop_grace_period: 30s
  environment:
    NODE_ENV: production
    HOST: 0.0.0.0
    PORT: 8790
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:8790/healthz').then((res)=>{if(!res.ok) process.exit(1);}).catch(()=>process.exit(1))",
      ]
    interval: 30s
    timeout: 5s
    start_period: 40s
    retries: 5

services:
  company-alpha:
    <<: *claw-empire-service
    container_name: claw-empire-company-alpha
    env_file:
      - ./runtime/company-alpha.env
    ports:
      - "8791:8790"
    volumes:
      - company_alpha_data:/var/lib/claw-empire
      - company_alpha_logs:/var/log/claw-empire

  company-beta:
    <<: *claw-empire-service
    container_name: claw-empire-company-beta
    env_file:
      - ./runtime/company-beta.env
    ports:
      - "8792:8790"
    volumes:
      - company_beta_data:/var/lib/claw-empire
      - company_beta_logs:/var/log/claw-empire

volumes:
  company_alpha_data:
  company_alpha_logs:
  company_beta_data:
  company_beta_logs:
